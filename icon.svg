      <line x1="14" y1="-5" x2="36" y2="-16"/>
      <line x1="9" y1="12" x2="24" y2="31"/>
      <line x1="-9" y1="12" x2="-24" y2="31"/>
      <line x1="-14" y1="-5" x2="-36" y2="-16"/>
    </g>
  </g>
</svg>
