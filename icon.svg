<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#2ecc71"/>
  <g transform="translate(64,64)">
    <circle r="40" fill="#fff" stroke="#0b0f14" stroke-width="4"/>
    <!-- center pentagon -->
